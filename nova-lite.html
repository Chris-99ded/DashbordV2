<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jarvis · AI-assistent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #6EE7B7; --accent-2: #67E8F9; --bg: #05060c; --fg: #e9ecf5; --muted: rgba(233,236,245,.55); --line: rgba(255,255,255,.1); }
html, body { background: var(--bg); }
body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); min-height: 100vh; }

.wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 80px; }
.top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.top-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
.icon-btn { border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; padding: 7px 10px; cursor: pointer; font-size: 15px; line-height: 1; opacity: .55; transition: opacity .15s, border-color .15s; }
.icon-btn:hover { opacity: 1; }
.icon-btn.active { opacity: 1; border-color: var(--accent); }
.keypanel { display: none; }
.keypanel.open { display: block; }

/* orb */
.orb { width: 60px; height: 60px; border-radius: 50%; position: relative; flex-shrink: 0;
  background: radial-gradient(circle at 32% 28%, #eafff6, var(--accent) 42%, #1f8f66 100%);
  box-shadow: 0 0 22px -2px var(--accent), inset 0 -6px 14px rgba(0,0,0,.25);
  animation: orbFloat 4s ease-in-out infinite; }
.orb::before, .orb::after { content: ''; position: absolute; top: 38%; width: 9px; height: 9px; border-radius: 50%;
  background: #06281d; box-shadow: 0 0 6px rgba(0,0,0,.4); transition: height .15s; }
.orb::before { left: 30%; } .orb::after { right: 30%; }
.orb.think { animation: orbFloat 1.1s ease-in-out infinite, orbPulse 1.1s ease-in-out infinite; }
.orb.listen { animation: orbFloat 0.7s ease-in-out infinite, orbPulse 0.7s ease-in-out infinite;
  box-shadow: 0 0 34px 4px #f87171, inset 0 -6px 14px rgba(0,0,0,.25); }
.orb.happy::before, .orb.happy::after { height: 4px; border-radius: 0 0 9px 9px; }
@keyframes orbFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
@keyframes orbPulse { 0%,100% { box-shadow: 0 0 22px -2px var(--accent) } 50% { box-shadow: 0 0 34px 2px var(--accent) } }

.title h1 { font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-size: 26px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.title .role { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* key setup */
.keybar { display: flex; gap: 8px; margin-bottom: 16px; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 11px 13px; font-size: 13px; outline: none; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 16px; cursor: pointer; color: #04140d; background: var(--accent); font-weight: 600; font-size: 13px; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
.hint a { color: var(--accent-2); }
.hint.saved { color: var(--accent); }

/* voice picker */
.voice-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
.voice-row label { font-size: 11px; font-weight: 700; letter-spacing: .10em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
.voice-select { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 9px 11px; font-size: 12px; outline: none; appearance: none; cursor: pointer; }
.voice-select:focus { border-color: var(--accent); }
.voice-sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.slider-group { display: flex; flex-direction: column; gap: 5px; }
.slider-group label { font-size: 10px; font-weight: 700; letter-spacing: .10em; text-transform: uppercase; color: var(--muted); }
.slider-group input[type=range] { accent-color: var(--accent); width: 100%; }

/* chat */
.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #04140d; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 18%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

/* composer */
.composer { display: flex; gap: 9px; position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, #05060c 80%, transparent); max-width: 560px; margin: 0 auto; }
.composer input { flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--line); color: var(--fg); border-radius: 12px; padding: 13px 15px; font-size: 14.5px; outline: none; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 50px; border: 0; border-radius: 12px; cursor: pointer; color: #04140d; background: var(--accent); font-size: 18px; flex-shrink: 0; transition: transform .1s, background .15s; }
.composer button:active { transform: scale(.94); }
#mic { background: rgba(255,255,255,.06); border: 1px solid var(--line) !important; color: var(--fg); font-size: 20px; }
#mic.listening { background: rgba(248,113,113,.18); border-color: #f87171 !important; animation: micPulse 1s ease-in-out infinite; }
@keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)} 50%{box-shadow:0 0 0 6px rgba(248,113,113,0)} }

/* voice status banner */
#voiceBanner { display: none; text-align: center; font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .08em; color: var(--accent); margin-bottom: 14px; }
#voiceBanner.show { display: block; }

/* Apple Health card */
.ah-card { display: none; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 14px 18px; margin-bottom: 18px; }
.ah-card.loaded { display: block; }
.ah-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ah-title { font-family: ui-monospace, monospace; font-size: 10px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.ah-dot { width: 7px; height: 7px; border-radius: 50%; background: #f87171; animation: ahPulse 2s ease-in-out infinite; }
.ah-dot.live { background: #6EE7B7; }
@keyframes ahPulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.ah-updated { font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); }
.ah-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 400px) { .ah-stats { grid-template-columns: repeat(2, 1fr); } }
.ah-stat { text-align: center; }
.ah-val { font-size: 20px; font-weight: 700; color: var(--fg); font-variant-numeric: tabular-nums; line-height: 1; }
.ah-label { font-size: 9.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="orb" id="orb"></div>
      <div class="title"><h1>Jarvis</h1><div class="role">din ai-assistent</div></div>
      <div class="top-right">
        <button id="ttsToggle" class="icon-btn" title="Slå av/på tale">🔊</button>
        <button id="keyToggle" class="icon-btn" title="API-nøkkel">🔑</button>
      </div>
    </div>

    <div class="keypanel" id="keypanel">
      <div class="keybar">
        <input id="keyInput" type="password" placeholder="lim inn Anthropic API-nøkkel (sk-ant-…)" autocomplete="off" />
        <button id="keySave">Lagre</button>
      </div>
      <div class="hint" id="hint">
        Nøkkelen lagres kun i <b>denne nettleseren</b> og sendes direkte til Anthropic — aldri til oss.
        Hent nøkkel på <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
      </div>
      <div class="voice-row">
        <label>Stemme</label>
        <select id="voiceSelect" class="voice-select"><option value="">Laster stemmer…</option></select>
      </div>
      <div class="voice-sliders">
        <div class="slider-group">
          <label>Pitch <span id="pitchVal">0.80</span></label>
          <input type="range" id="pitchSlider" min="0.1" max="1.5" step="0.05" value="0.80">
        </div>
        <div class="slider-group">
          <label>Hastighet <span id="rateVal">0.90</span></label>
          <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.05" value="0.90">
        </div>
      </div>
    </div>

    <div class="ah-card" id="ahCard">
      <div class="ah-header">
        <span class="ah-title"><span class="ah-dot" id="ahDot"></span>Apple Health</span>
        <span class="ah-updated" id="ahUpdated"></span>
      </div>
      <div class="ah-stats">
        <div class="ah-stat"><div class="ah-val" id="ahSteps">—</div><div class="ah-label">Skritt</div></div>
        <div class="ah-stat"><div class="ah-val" id="ahHR">—</div><div class="ah-label">Puls</div></div>
        <div class="ah-stat"><div class="ah-val" id="ahSleep">—</div><div class="ah-label">Søvn</div></div>
        <div class="ah-stat"><div class="ah-val" id="ahWeight">—</div><div class="ah-label">Vekt</div></div>
      </div>
    </div>

    <div id="voiceBanner">🎤 Lytter…</div>
    <div class="feed" id="feed"></div>
  </div>

  <div class="composer">
    <button id="mic" title="Snakk til Jarvis">🎤</button>
    <input id="chatInput" placeholder="skriv eller bruk mikrofon…" autocomplete="off" />
    <button id="send" aria-label="Send">→</button>
  </div>

<script>
(function(){
  const KEY_LS = 'nova_lite_api_key';
  const TTS_LS = 'jarvis_tts_on';
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const keypanel = document.getElementById('keypanel');
  const keyToggle = document.getElementById('keyToggle');
  const ttsToggle = document.getElementById('ttsToggle');
  const micBtn = document.getElementById('mic');
  const voiceBanner = document.getElementById('voiceBanner');

  // ---- orb ----
  function setOrb(s){ orb.className = 'orb' + (s ? ' ' + s : ''); }

  // ---- key ----
  function savedKey(){ try { return localStorage.getItem(KEY_LS) || ''; } catch(e){ return ''; } }
  keyToggle.addEventListener('click', () => {
    keypanel.classList.toggle('open');
    keyToggle.classList.toggle('active', keypanel.classList.contains('open'));
  });
  if (savedKey()) {
    hint.classList.add('saved'); hint.innerHTML = '✓ Nøkkel lagret i denne nettleseren.';
    keyInput.placeholder = '•••• nøkkel lagret ••••'; keyToggle.classList.add('active');
  }
  document.getElementById('keySave').addEventListener('click', () => {
    const k = keyInput.value.trim(); if (!k) return;
    try { localStorage.setItem(KEY_LS, k); } catch(e){}
    keyInput.value = ''; keyInput.placeholder = '•••• nøkkel lagret ••••';
    hint.classList.add('saved'); hint.innerHTML = '✓ Nøkkel lagret i denne nettleseren.';
    keyToggle.classList.add('active');
    keypanel.classList.remove('open');
  });

  // ---- TTS toggle ----
  let ttsOn = localStorage.getItem(TTS_LS) !== 'off';
  function updateTtsBtn(){ ttsToggle.classList.toggle('active', ttsOn); ttsToggle.title = ttsOn ? 'Slå av tale' : 'Slå på tale'; }
  updateTtsBtn();
  ttsToggle.addEventListener('click', () => {
    ttsOn = !ttsOn;
    try { localStorage.setItem(TTS_LS, ttsOn ? 'on' : 'off'); } catch(e){}
    updateTtsBtn();
    if (!ttsOn && window.speechSynthesis) window.speechSynthesis.cancel();
  });

  // ---- Voice picker ----
  const VOICE_LS = 'jarvis_voice_name';
  const PITCH_LS = 'jarvis_pitch';
  const RATE_LS  = 'jarvis_rate';
  const voiceSelect = document.getElementById('voiceSelect');
  const pitchSlider = document.getElementById('pitchSlider');
  const rateSlider  = document.getElementById('rateSlider');
  const pitchVal    = document.getElementById('pitchVal');
  const rateVal     = document.getElementById('rateVal');

  let currentPitch = parseFloat(localStorage.getItem(PITCH_LS) || '0.80');
  let currentRate  = parseFloat(localStorage.getItem(RATE_LS)  || '0.90');
  pitchSlider.value = currentPitch; pitchVal.textContent = currentPitch.toFixed(2);
  rateSlider.value  = currentRate;  rateVal.textContent  = currentRate.toFixed(2);

  pitchSlider.addEventListener('input', () => {
    currentPitch = parseFloat(pitchSlider.value);
    pitchVal.textContent = currentPitch.toFixed(2);
    try { localStorage.setItem(PITCH_LS, currentPitch); } catch(e){}
  });
  rateSlider.addEventListener('input', () => {
    currentRate = parseFloat(rateSlider.value);
    rateVal.textContent = currentRate.toFixed(2);
    try { localStorage.setItem(RATE_LS, currentRate); } catch(e){}
  });

  // Jarvis-voice priority: prefer deep natural/neural English male voices
  const PRIO = ['guy','david','mark','james','uk english male','us english male','male','en-gb','en-us'];
  function pickJarvisVoice(voices) {
    const saved = localStorage.getItem(VOICE_LS);
    if (saved) { const v = voices.find(v => v.name === saved); if (v) return v; }
    for (const kw of PRIO) {
      const v = voices.find(v => v.name.toLowerCase().includes(kw));
      if (v) return v;
    }
    return voices[0] || null;
  }

  function populateVoices() {
    if (!window.speechSynthesis) return;
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return;
    const saved = localStorage.getItem(VOICE_LS);
    const best = pickJarvisVoice(voices);
    voiceSelect.innerHTML = voices.map(v =>
      `<option value="${v.name}" ${(saved ? v.name === saved : v === best) ? 'selected' : ''}>${v.name} (${v.lang})</option>`
    ).join('');
    if (!saved && best) try { localStorage.setItem(VOICE_LS, best.name); } catch(e){}
  }

  voiceSelect.addEventListener('change', () => {
    try { localStorage.setItem(VOICE_LS, voiceSelect.value); } catch(e){}
  });

  if (window.speechSynthesis) {
    window.speechSynthesis.addEventListener('voiceschanged', populateVoices);
    populateVoices();
  }

  // ---- TTS speak ----
  function speak(text){
    if (!ttsOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/\*\*/g, '').replace(/^[-•]\s*/gm, '').replace(/<[^>]+>/g, '').trim();
    const utt = new SpeechSynthesisUtterance(clean);
    const voices = window.speechSynthesis.getVoices();
    const chosen = voices.find(v => v.name === (localStorage.getItem(VOICE_LS) || '')) || pickJarvisVoice(voices);
    if (chosen) { utt.voice = chosen; utt.lang = chosen.lang; }
    utt.pitch = currentPitch;
    utt.rate  = currentRate;
    window.speechSynthesis.speak(utt);
  }

  // ---- Speech Recognition (mic) ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = SR ? new SR() : null;
  let listening = false;

  if (recognition) {
    recognition.lang = 'nb-NO';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
      listening = true;
      micBtn.classList.add('listening');
      voiceBanner.classList.add('show');
      setOrb('listen');
    };
    recognition.onend = () => {
      listening = false;
      micBtn.classList.remove('listening');
      voiceBanner.classList.remove('show');
      if (orb.classList.contains('listen')) setOrb('');
    };
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      input.value = transcript;
      ask(transcript);
    };
    recognition.onerror = (e) => {
      listening = false;
      micBtn.classList.remove('listening');
      voiceBanner.classList.remove('show');
      setOrb('');
      if (e.error !== 'no-speech') addCoach(render('- Mikrofon feil: **' + e.error + '**. Sjekk at nettleseren har tilgang.'));
    };

    micBtn.addEventListener('click', () => {
      if (listening) { recognition.stop(); return; }
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      recognition.start();
    });
  } else {
    micBtn.title = 'Talegjenkjenning støttes ikke i denne nettleseren';
    micBtn.style.opacity = '.35';
    micBtn.style.cursor = 'not-allowed';
  }

  // ---- Supabase config (same as topbar.js / sync.js) ----
  const SUPA_URL = (window.DASH_SUPABASE_URL) || 'https://srajryooffirbroltjmg.supabase.co';
  const SUPA_KEY = (window.DASH_SUPABASE_KEY) || 'sb_publishable_5142ZwTLF_DkSVRzciNuRA_bHwRAu4c';

  // ---- Apple Health fetch + render ----
  function relAgo(iso) {
    if (!iso) return '';
    const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 60) return 'akkurat nå';
    if (s < 3600) return Math.floor(s/60) + ' min siden';
    if (s < 86400) return Math.floor(s/3600) + ' t siden';
    return Math.floor(s/86400) + ' d siden';
  }
  function renderAH(d) {
    if (!d) return;
    document.getElementById('ahCard').classList.add('loaded');
    const dot = document.getElementById('ahDot');
    const ageS = d.updated_at ? (Date.now() - new Date(d.updated_at).getTime()) / 1000 : Infinity;
    dot.classList.toggle('live', ageS < 3600);
    document.getElementById('ahUpdated').textContent = d.updated_at ? relAgo(d.updated_at) : '';
    document.getElementById('ahSteps').textContent  = d.steps_today  != null ? Number(d.steps_today).toLocaleString('no') : '—';
    document.getElementById('ahHR').textContent     = d.heart_rate_bpm != null ? d.heart_rate_bpm + ' bpm' : '—';
    document.getElementById('ahSleep').textContent  = d.sleep_hours  != null ? d.sleep_hours + ' t' : '—';
    document.getElementById('ahWeight').textContent = d.weight_kg    != null ? d.weight_kg + ' kg' : '—';
    try { localStorage.setItem('apple_health', JSON.stringify(d)); } catch(e){}
  }
  async function fetchAppleHealth() {
    if (!SUPA_URL || SUPA_URL.indexOf('PASTE') === 0) return;
    try {
      const res = await fetch(SUPA_URL + '/rest/v1/app_state?select=data&key=eq.apple_health', {
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
      });
      const json = await res.json();
      if (json && json[0] && json[0].data) renderAH(json[0].data);
    } catch(e){}
  }
  fetchAppleHealth();
  setInterval(fetchAppleHealth, 5 * 60 * 1000);

  // ---- dashboard context ----
  function dashboardData(){
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k === KEY_LS || k === TTS_LS) continue;
      try { out[k] = JSON.parse(localStorage.getItem(k)); } catch(e){ out[k] = localStorage.getItem(k); }
    }
    return out;
  }

  // ---- render markdown-ish ----
  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="pill">$1</span>'); }
  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }

  function addUser(t){ const e = document.createElement('div'); e.className = 'msg user'; e.innerHTML = '<div class="bubble">' + esc(t) + '</div>'; feed.appendChild(e); scroll(); }
  function addCoach(html){ const e = document.createElement('div'); e.className = 'msg coach'; e.innerHTML = '<div class="bubble"><span class="tag">Jarvis</span><div>' + html + '</div></div>'; feed.appendChild(e); scroll(); return e; }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  // ---- system prompt ----
  const SYS =
    "Du er Jarvis, en personlig AI-assistent som lever inne i brukerens livstrackingdashboard. " +
    "Du kan se brukerens lagrede data (mat, vann, trening, økonomi, søvn, mål osv.). " +
    "Gi ærlig, spesifikk og oppmuntrende veiledning. " +
    "SVAR ALLTID PÅ NORSK BOKMÅL, uansett hva brukeren skriver. " +
    "Svar med korte kulepunkter som starter med '- ', enkle ord og enkelt språk. " +
    "Sett viktige ord og tall i **doble stjerner**. " +
    "Avslutt alltid med ett '- Gjør i dag:' kulepunkt som gir én konkret handling. " +
    "Dashboard-data som JSON:\n";

  // ---- send ----
  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    const key = savedKey();
    if (!key){ addCoach('- Lim inn din **Anthropic API-nøkkel** ovenfor, og spør meg igjen.'); return; }
    busy = true; addUser(text); input.value = '';
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-8',
          max_tokens: 1024,
          system: SYS + JSON.stringify(dashboardData()),
          messages: [{ role: 'user', content: text }],
        }),
      });
      const json = await res.json();
      if (json.error){
        const errType = json.error.type || '';
        let errMsg = 'Noe gikk galt — sjekk API-nøkkelen.';
        if (errType === 'overloaded_error') errMsg = 'Anthropic sine servere er overbelastet akkurat nå. Vent litt og prøv igjen.';
        else if (errType === 'authentication_error') errMsg = 'Ugyldig API-nøkkel — sjekk at du limte inn riktig nøkkel.';
        else if (errType === 'rate_limit_error') errMsg = 'For mange forespørsler — vent litt og prøv igjen.';
        loading.querySelector('div:last-child').innerHTML = render('- ' + errMsg);
        setOrb(''); busy = false; return;
      }
      const reply = (json.content && json.content[0] && json.content[0].text) || 'Hmm, ingen respons.';
      loading.querySelector('div:last-child').innerHTML = render(reply);
      setOrb('happy'); setTimeout(() => setOrb(''), 2500);
      speak(reply);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Kunne ikke nå Anthropic — sjekk internettforbindelsen og nøkkelen.');
      setOrb('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });

  addCoach('Hei! Jeg er <b>Jarvis</b>, din personlige AI-assistent. Lim inn API-nøkkelen ovenfor, så kan du spørre meg om trening, helse, økonomi eller hva du vil. Du kan også <b>snakke med meg</b> ved å trykke på 🎤. Jeg svarer alltid på norsk.');
})();
</script>

</html>
